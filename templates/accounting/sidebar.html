<!-- SIDEBAR -->
<aside id="logo-sidebar"
    class="fixed top-0 left-0 z-50 w-64 h-screen bg-white border-r border-gray-200
           transform -translate-x-full transition-transform duration-300 ease-in-out
           lg:translate-x-0">

    <!-- MOBILE HEADER (LOGO + CLOSE) -->
    <div class="flex items-center justify-between px-4 py-4 border-b lg:hidden">

        <h2 class=" text-gray-700">Sales Dashboard</h2>

        <button id="sidebarClose"
            class="w-9 h-9 flex items-center justify-center rounded-lg hover:bg-gray-100">
            <i class="fa-solid fa-xmark text-lg text-gray-600"></i>
        </button>

    </div>

    <!-- CONTENT -->
    <div class="h-full px-4 pb-6 overflow-y-auto pt-4 lg:pt-6">

        <!-- TITLE (desktop only) -->
        <div class="mb-6 px-3 hidden lg:block">
            <h2 class=" text-gray-500 ">
                Account Dashboard
            </h2>
        </div>

       <ul class="space-y-2 font-medium">

    <!-- DASHBOARD -->
    <li>
        <a href="{% url 'accountant_dashboard' %}"
            class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 rounded-2xl hover:bg-blue-50 hover:text-blue-600 transition">
            <i class="fa-solid fa-chart-line"></i>
            <span>Dashboard</span>
        </a>
    </li>

    <!-- =========================
         ACCOUNTING SECTION
    ========================== -->

    <div class="mt-6 mb-2 px-3 text-xs font-semibold text-gray-400 uppercase">
        Accounting
    </div>

    <!-- JOURNAL ENTRIES -->
    <li>
        <a href="{% url 'create_journal_entry' %}"
            class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 rounded-2xl hover:bg-blue-50 hover:text-blue-600 transition">
            <i class="fa-solid fa-book"></i>
            <span>Journal Entries</span>
        </a>
    </li>

    <!-- JOURNAL LIST -->
    <li>
        <a href="{%url 'journal_list'%}"
            class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 rounded-2xl hover:bg-blue-50 hover:text-blue-600 transition">
            <i class="fa-solid fa-list"></i>
            <span>Journal List</span>
        </a>
    </li>

    <!-- CHART OF ACCOUNTS -->
    <li>
    <a href="{%url 'chart_of_accounts'%}"
            class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 rounded-2xl hover:bg-blue-50 hover:text-blue-600 transition">
            <i class="fa-solid fa-diagram-project"></i>
            <span>Chart of Accounts</span>
        </a>
    </li>

    <!-- LEDGER -->
    <li>
        <a href="{%url 'general_ledger'%}"
            class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 rounded-2xl hover:bg-blue-50 hover:text-blue-600 transition">
            <i class="fa-solid fa-file-lines"></i>
            <span>General Ledger</span>
        </a>
    </li>

    <!-- TRIAL BALANCE -->
    <li>
        <a href="{%url 'trial_balance' %}"
            class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 rounded-2xl hover:bg-blue-50 hover:text-blue-600 transition">
            <i class="fa-solid fa-scale-balanced"></i>
            <span>Trial Balance</span>
        </a>
    </li>

    <!-- FINANCIAL REPORTS -->
    <li>
        <a href="{%url 'employee_list' %}"
            class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 rounded-2xl hover:bg-blue-50 hover:text-blue-600 transition">
            <i class="fa-solid fa-chart-pie"></i>
            <span>Manage Employees</span>
        </a>
    </li>

    <!-- FINANCIAL REPORTS -->
    <li>
        <a href="{%url 'payroll_list' %}"
            class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 rounded-2xl hover:bg-blue-50 hover:text-blue-600 transition">
            <i class="fa-solid fa-chart-pie"></i>
            <span>Manage Payrolls</span>
        </a>
    </li>

    <!-- EXPENSES (your existing) -->
    <li>
        <a href="{% url 'account_expense_list' %}"
            class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 rounded-2xl hover:bg-blue-50 hover:text-blue-600 transition">
            <i class="fa-solid fa-box"></i>
            <span>Expenses</span>
        </a>
    </li>

    <!-- =========================
         SETTINGS
    ========================== -->

    <div class="mt-6 mb-2 px-3 text-xs font-semibold text-gray-400 uppercase">
        Settings
    </div>

    <li>
        <a href="{%url 'account_type_list_create' %}"
            class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 rounded-2xl hover:bg-blue-50 hover:text-blue-600 transition">
            <i class="fa-solid fa-sitemap"></i>
            <span>Account Types</span>
        </a>
    </li>

</ul>
    </div>
</aside>

<!-- OVERLAY -->
<div id="sidebar-overlay"
     class="fixed inset-0 bg-black/40 hidden z-40 lg:hidden"></div>
